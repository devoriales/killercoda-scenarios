# Rate Limiting Middleware — token bucket algorithm
# average: sustained request rate per second (token refill rate)
# burst: max requests allowed to exceed the average in a short spike
# Apply: kubectl apply -f /root/manifests/06-traefik-middlewares/rate-limit.yaml
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rate-limit
  namespace: bookstore
spec:
  rateLimit:
    average: 10
    burst: 20
