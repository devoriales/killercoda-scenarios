# Use Case: Apply Traefik Middlewares to an HTTPRoute via ExtensionRef (Lesson 08).
# ExtensionRef is the Gateway API extension point for vendor-specific filters.
# Apply: kubectl apply -f 06-traefik-middlewares/httproute-with-middleware.yaml
# Prerequisites: rate-limit.yaml and security-headers.yaml applied
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: bookstore-with-middleware
  namespace: bookstore
  labels:
    app.kubernetes.io/part-of: bookstore-tutorial
spec:
  parentRefs:
  - name: bookstore-gateway
    namespace: bookstore
    sectionName: https
  hostnames:
  - bookstore.local
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api
    filters:
    # ExtensionRef: attach a Traefik Middleware to this route rule
    - type: ExtensionRef
      extensionRef:
        group: traefik.io
        kind: Middleware
        name: rate-limit
    - type: ExtensionRef
      extensionRef:
        group: traefik.io
        kind: Middleware
        name: security-headers
    backendRefs:
    - name: bookstore
      port: 80
